name: ✨ Feature request
description: Suggest a capability or improvement for the Zoho Cliq channel plugin.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point behind the request.
      placeholder: When running the bot in multiple channels, I need to …
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like the plugin to do. Config/API sketches welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've tried.
    validations:
      required: false
  - type: checkboxes
    id: parity
    attributes:
      label: Prior art
      description: Optional — does a bundled channel already do this?
      options:
        - label: This exists in the Telegram or Discord channel and I'd like parity.
          required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and ROADMAP.md and this is not already tracked.
          required: true
