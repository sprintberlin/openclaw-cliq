name: CI

# Fast feedback on every push and PR: typecheck, tests, and a build. The
# publish workflow re-runs all of this on the tagged commit before publishing,
# so a green CI here is the gate for merging to main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - name: Verify build artifacts
        run: |
          set -euo pipefail
          test -f dist/index.js || { echo "::error::dist/index.js missing"; exit 1; }
          test -f dist/setup-entry.js || { echo "::error::dist/setup-entry.js missing"; exit 1; }
